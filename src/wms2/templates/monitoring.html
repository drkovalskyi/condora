{% extends "base.html" %}
{% block title %}WMS2 — Monitoring{% endblock %}
{% block content %}
<div x-data="monitoringPage" x-init="fetchData()">
    <h1>Monitoring</h1>

    <!-- Error banner -->
    <div x-show="error" class="error-banner" x-text="error"></div>
    <div x-show="loading && !data" style="opacity:0.6">Loading...</div>

    <!-- Data freshness -->
    <template x-if="data && data._data_age_seconds != null">
        <div class="data-freshness" x-text="'Updated ' + fmtAge(data._data_age_seconds) + ' ago'"></div>
    </template>

    <!-- Grand totals -->
    <template x-if="data">
        <div class="status-cards" style="margin-bottom:1.5rem;">
            <div class="status-card">
                <div class="count" style="color:#3b82f6" x-text="data.totals.running"></div>
                <div class="label">Jobs Running</div>
            </div>
            <div class="status-card">
                <div class="count" style="color:#6b7280" x-text="data.totals.idle"></div>
                <div class="label">Jobs Idle</div>
            </div>
            <div class="status-card">
                <div class="count" style="color:#f59e0b" x-text="data.totals.held"></div>
                <div class="label">Jobs Held</div>
            </div>
            <div class="status-card">
                <div class="count" x-text="data.requests.length"></div>
                <div class="label">Active Requests</div>
            </div>
        </div>
    </template>

    <!-- Per-request table -->
    <template x-if="data && data.requests.length > 0">
        <div class="section">
            <h3>Requests</h3>
            <table>
                <thead>
                    <tr>
                        <th>Request</th>
                        <th>Round</th>
                        <th style="text-align:right">WUs</th>
                        <th style="text-align:right">Events</th>
                        <th style="text-align:right">Done</th>
                        <th style="text-align:right">Running</th>
                        <th style="text-align:right">Idle</th>
                        <th style="text-align:right">Held</th>
                        <th>Sites</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="r in data.requests" :key="r.request_name">
                        <tr>
                            <td class="truncate">
                                <a :href="'/ui/requests/' + encodeURIComponent(r.request_name)"
                                   x-text="r.request_name"></a>
                            </td>
                            <td x-text="r.round"></td>
                            <td style="text-align:right"
                                x-text="r.work_units ? (r.work_units.done + '/' + r.work_units.total) : '—'"></td>
                            <td style="text-align:right"
                                x-text="r.events ? fmtCompact(r.events.produced) + '/' + fmtCompact(r.events.target) : '—'"></td>
                            <td style="text-align:right; color:#22c55e"
                                x-text="r.dag_nodes ? r.dag_nodes.done : 0"></td>
                            <td style="text-align:right; font-weight:600; color:#3b82f6"
                                x-text="r.totals.running"></td>
                            <td style="text-align:right; font-weight:600; color:#6b7280"
                                x-text="r.totals.idle"></td>
                            <td style="text-align:right; font-weight:600; color:#f59e0b"
                                x-text="r.totals.held"></td>
                            <td>
                                <span class="site-chips">
                                    <template x-for="s in requestSites(r)" :key="s.site">
                                        <span class="site-chip" :title="s.detail">
                                            <span x-text="s.site || '(unmatched)'"></span>
                                            <span class="site-counts" x-text="s.label"></span>
                                        </span>
                                    </template>
                                </span>
                            </td>
                        </tr>
                    </template>
                </tbody>
                <tfoot>
                    <tr style="font-weight:700; border-top:2px solid var(--pico-muted-border-color);">
                        <td colspan="4">Total</td>
                        <td style="text-align:right; color:#22c55e" x-text="sumField('dag_nodes', 'done')"></td>
                        <td style="text-align:right; color:#3b82f6" x-text="data.totals.running"></td>
                        <td style="text-align:right; color:#6b7280" x-text="data.totals.idle"></td>
                        <td style="text-align:right; color:#f59e0b" x-text="data.totals.held"></td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </template>

    <template x-if="data && data.requests.length === 0">
        <p style="opacity:0.6">No active requests with running DAGs.</p>
    </template>

    <!-- Per-site summary -->
    <template x-if="data && allSites.length > 0">
        <div class="section">
            <h3>HTCondor Jobs by Site</h3>
            <table>
                <thead>
                    <tr>
                        <th>Site</th>
                        <th style="text-align:right">Running</th>
                        <th style="text-align:right">Idle</th>
                        <th style="text-align:right">Held</th>
                        <th style="text-align:right">Total</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="s in allSites" :key="s.site">
                        <tr>
                            <td x-text="s.site || '(unmatched)'"></td>
                            <td style="text-align:right; color:#3b82f6" x-text="s.running"></td>
                            <td style="text-align:right; color:#6b7280" x-text="s.idle"></td>
                            <td style="text-align:right; color:#f59e0b" x-text="s.held"></td>
                            <td style="text-align:right; font-weight:600" x-text="s.running + s.idle + s.held"></td>
                        </tr>
                    </template>
                </tbody>
                <tfoot>
                    <tr style="font-weight:700; border-top:2px solid var(--pico-muted-border-color);">
                        <td>Total</td>
                        <td style="text-align:right; color:#3b82f6" x-text="data.totals.running"></td>
                        <td style="text-align:right; color:#6b7280" x-text="data.totals.idle"></td>
                        <td style="text-align:right; color:#f59e0b" x-text="data.totals.held"></td>
                        <td style="text-align:right" x-text="data.totals.running + data.totals.idle + data.totals.held"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </template>
</div>

<style>
.data-freshness {
    font-size: 0.8rem;
    opacity: 0.55;
    margin-bottom: 0.5rem;
}
.site-chips {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
}
.site-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.1rem 0.45rem;
    border-radius: 4px;
    font-size: 0.78rem;
    background: var(--pico-card-background-color);
    border: 1px solid var(--pico-muted-border-color);
    white-space: nowrap;
}
.site-counts {
    font-weight: 600;
    opacity: 0.85;
}
</style>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('monitoringPage', () => ({
        data: null,
        loading: true,
        error: null,

        init() {
            this.fetchData();
            window.addEventListener('wms2:refresh', () => this.fetchData());
        },

        async fetchData() {
            try {
                this.error = null;
                this.loading = true;
                this.data = await WMS2_API.htcondorOverview();
            } catch (e) {
                this.error = e.message;
            } finally {
                this.loading = false;
            }
        },

        fmtAge(seconds) {
            if (seconds < 5) return 'just now';
            if (seconds < 60) return Math.round(seconds) + 's';
            return Math.round(seconds / 60) + 'm';
        },

        fmtCompact(n) {
            if (n == null) return '—';
            if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
            return String(n);
        },

        sumField(obj, key) {
            if (!this.data) return 0;
            return this.data.requests.reduce((sum, r) => sum + ((r[obj] && r[obj][key]) || 0), 0);
        },

        requestSites(r) {
            // Build sorted list of sites with any jobs
            const entries = Object.entries(r.sites || {})
                .map(([site, c]) => ({
                    site,
                    running: c.running || 0,
                    idle: c.idle || 0,
                    held: c.held || 0,
                }))
                .filter(s => (s.running + s.idle + s.held) > 0)
                .sort((a, b) => (b.running + b.idle) - (a.running + a.idle));

            return entries.map(s => {
                const parts = [];
                if (s.running) parts.push(s.running + ' run');
                if (s.idle) parts.push(s.idle + ' idle');
                if (s.held) parts.push(s.held + ' held');
                return {
                    site: s.site,
                    label: parts.join(', '),
                    detail: `Running: ${s.running}, Pending: ${s.idle}, Held: ${s.held}`,
                };
            });
        },

        get allSites() {
            if (!this.data || !this.data.totals.by_site) return [];
            return Object.entries(this.data.totals.by_site)
                .map(([site, c]) => ({
                    site,
                    running: c.running || 0,
                    idle: c.idle || 0,
                    held: c.held || 0,
                }))
                .sort((a, b) => (b.running + b.idle + b.held) - (a.running + a.idle + a.held));
        },
    }));
});
</script>
{% endblock %}
