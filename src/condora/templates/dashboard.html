{% extends "base.html" %}
{% block title %}Condora — Dashboard{% endblock %}
{% block content %}
<div x-data="dashboardPage" x-init="fetchData()">
    <h1>Dashboard</h1>

    <!-- Error banner -->
    <div x-show="error" class="error-banner" x-text="error"></div>

    <!-- Lifecycle indicator -->
    <div x-show="lifecycle !== null" class="lifecycle-indicator"
         :class="lifecycle && lifecycle.running ? 'running' : 'stopped'">
        <span class="dot" :class="lifecycle && lifecycle.running ? 'green' : 'red'"></span>
        <span x-text="lifecycle && lifecycle.running ? 'Lifecycle manager running' : 'Lifecycle manager stopped'"></span>
        <template x-if="lifecycle && lifecycle.running">
            <span x-text="'(cycle: ' + lifecycle.cycle_interval + 's)'"></span>
        </template>
    </div>

    <!-- Status cards -->
    <div class="status-cards">
        <template x-for="[status, count] in statusEntries" :key="status">
            <div class="status-card">
                <div class="count" x-text="count"></div>
                <div class="label" x-text="status"></div>
            </div>
        </template>
    </div>

    <!-- Admission queue -->
    <template x-if="admission">
        <div class="section">
            <h3>Admission Queue</h3>
            <div>
                Active DAGs: <strong x-text="admission.active_dags || 0"></strong>
                / <span x-text="admission.max_active_dags || '—'"></span>
            </div>
            <div class="progress-bar" style="max-width:400px;">
                <div class="fill" :style="'width:' + admissionPct + '%'"></div>
            </div>
            <div style="font-size:0.85rem; opacity:0.7">
                <span x-text="(admission.queued_count || 0) + ' queued'"></span>
            </div>
        </div>
    </template>

    <!-- Recent requests table -->
    <div class="section">
        <h3>Recent Requests</h3>
        <div x-show="loading" style="opacity:0.6">Loading...</div>
        <table x-show="!loading && requests.length > 0">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Campaign</th>
                    <th>Priority</th>
                    <th>Updated</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="r in requests.slice(0, 20)" :key="r.request_name">
                    <tr>
                        <td class="truncate">
                            <a :href="'/ui/requests/' + encodeURIComponent(r.request_name)"
                               x-text="r.request_name"></a>
                        </td>
                        <td x-html="statusBadge(r.status)"></td>
                        <td x-text="r.campaign || '—'"></td>
                        <td x-text="r.priority"></td>
                        <td x-text="fmtAge(r.updated_at)"></td>
                    </tr>
                </template>
            </tbody>
        </table>
        <p x-show="!loading && requests.length === 0" style="opacity:0.6">No requests found.</p>
        <p x-show="requests.length > 20">
            <a href="/ui/requests">View all requests &rarr;</a>
        </p>
    </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('dashboardPage', () => ({
        statusCounts: {},
        requests: [],
        lifecycle: null,
        admission: null,
        loading: true,
        error: null,

        init() {
            this.fetchData();
            window.addEventListener('condora:refresh', () => this.fetchData());
        },

        async fetchData() {
            try {
                this.error = null;
                this.loading = true;
                const [statusResp, reqs, lc, adm] = await Promise.all([
                    CONDORA_API.status().catch(() => null),
                    CONDORA_API.listRequests('limit=100').catch(() => []),
                    CONDORA_API.lifecycleStatus().catch(() => null),
                    CONDORA_API.admissionQueue().catch(() => null),
                ]);
                this.statusCounts = statusResp ? (statusResp.requests_by_status || {}) : {};
                this.requests = reqs;
                this.lifecycle = lc;
                this.admission = adm;
            } catch (e) {
                this.error = e.message;
            } finally {
                this.loading = false;
            }
        },

        get statusEntries() {
            const order = ['new','submitted','queued','pilot_running','planning','active',
                           'stopping','resubmitting','held','completed','partial','failed','aborted'];
            const entries = [];
            for (const s of order) {
                if (this.statusCounts[s] !== undefined && this.statusCounts[s] > 0) {
                    entries.push([s, this.statusCounts[s]]);
                }
            }
            if (entries.length === 0) {
                // Show all zeroes
                for (const s of order) entries.push([s, 0]);
            }
            return entries;
        },

        get admissionPct() {
            if (!this.admission || !this.admission.max_active_dags) return 0;
            return Math.min(100, 100 * (this.admission.active_dags || 0) / this.admission.max_active_dags);
        },
    }));
});
</script>
{% endblock %}
