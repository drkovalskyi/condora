{% extends "base.html" %}
{% block title %}Condora — DAG {{ dag_id[:8] }}{% endblock %}
{% block head_scripts %}
<script src="/static/js/components/dag-detail.js"></script>
<style>
    th[data-sort] { cursor: pointer; user-select: none; white-space: nowrap; }
    th[data-sort]:hover { background: rgba(0,0,0,0.05); }
    .table-filter { font-size: 0.8rem; padding: 0.15rem 0.4rem; border: 1px solid #ccc;
                    border-radius: 3px; width: 14rem; margin-left: 0.5rem; }
    .table-filter::placeholder { opacity: 0.5; }
</style>
{% endblock %}
{% block content %}
<div x-data="dagDetail('{{ dag_id|e }}')" data-dag-id="{{ dag_id|e }}">

    <div x-show="error" class="error-banner" x-text="error"></div>
    <div x-show="loading && !dag" style="opacity:0.6">Loading...</div>

    <template x-if="dag">
        <div>
            <h1 style="font-size:1.3rem;">
                DAG
                <span x-html="statusBadge(dag.status)" style="margin-left:0.5rem;"></span>
            </h1>
            <p style="opacity:0.7; font-size:0.85rem; word-break:break-all;" x-text="dag.id"></p>

            <!-- DAG metadata -->
            <div class="section">
                <h3>DAG Info</h3>
                <dl class="detail-grid">
                    <dt>DAGMan Cluster ID</dt>
                    <dd x-text="dag.dagman_cluster_id || '—'"></dd>
                    <dt>Schedd</dt>
                    <dd x-text="dag.schedd_name || '—'"></dd>
                    <dt>Submit Dir</dt>
                    <dd x-text="dag.submit_dir || '—'" style="word-break:break-all;"></dd>
                    <dt>DAG File</dt>
                    <dd x-text="dag.dag_file_path || '—'" style="word-break:break-all;"></dd>
                    <template x-if="dag.rescue_dag_path">
                        <div style="display:contents;">
                            <dt>Rescue DAG</dt>
                            <dd x-text="dag.rescue_dag_path" style="word-break:break-all;"></dd>
                        </div>
                    </template>
                    <template x-if="dag.parent_dag_id">
                        <div style="display:contents;">
                            <dt>Parent DAG</dt>
                            <dd>
                                <a :href="'/ui/dags/' + encodeURIComponent(dag.parent_dag_id)"
                                   x-text="dag.parent_dag_id"></a>
                            </dd>
                        </div>
                    </template>
                    <template x-if="dag.stop_requested_at">
                        <div style="display:contents;">
                            <dt>Stop Requested</dt>
                            <dd x-text="fmtDateTime(dag.stop_requested_at)"></dd>
                            <dt>Stop Reason</dt>
                            <dd x-text="dag.stop_reason || '—'"></dd>
                        </div>
                    </template>
                    <dt>Created</dt>
                    <dd x-text="fmtDateTime(dag.created_at)"></dd>
                    <dt>Submitted</dt>
                    <dd x-text="fmtDateTime(dag.submitted_at)"></dd>
                    <template x-if="dag.completed_at">
                        <div style="display:contents;">
                            <dt>Completed</dt>
                            <dd x-text="fmtDateTime(dag.completed_at)"></dd>
                        </div>
                    </template>
                </dl>
            </div>

            <!-- Node counts with bar -->
            <div class="section">
                <h3>Node Counts</h3>
                <div class="node-bar">
                    <div class="segment seg-done" :style="'width:' + segPct(dag.nodes_done)"></div>
                    <div class="segment seg-running" :style="'width:' + segPct(dag.nodes_running)"></div>
                    <div class="segment seg-idle" :style="'width:' + segPct(dag.nodes_idle)"></div>
                    <div class="segment seg-failed" :style="'width:' + segPct(dag.nodes_failed)"></div>
                    <div class="segment seg-held" :style="'width:' + segPct(dag.nodes_held)"></div>
                </div>
                <div class="node-counts">
                    <span>Total: <strong x-text="dag.total_nodes || 0"></strong></span>
                    <span style="border-left:3px solid #22c55e;">Done: <strong x-text="dag.nodes_done || 0"></strong></span>
                    <span style="border-left:3px solid #3b82f6;">Running: <strong x-text="dag.nodes_running || 0"></strong></span>
                    <span style="border-left:3px solid #6b7280;">Idle: <strong x-text="dag.nodes_idle || 0"></strong></span>
                    <span style="border-left:3px solid #ef4444;">Failed: <strong x-text="dag.nodes_failed || 0"></strong></span>
                    <span style="border-left:3px solid #f59e0b;">Held: <strong x-text="dag.nodes_held || 0"></strong></span>
                </div>
                <template x-if="nodeCountsByType.length > 0">
                    <div style="font-size:0.85rem; opacity:0.7; margin-top:0.25rem;">
                        By type:
                        <template x-for="nc in nodeCountsByType" :key="nc.type">
                            <span x-text="nc.count + ' ' + nc.type" style="margin-right:0.75rem;"></span>
                        </template>
                    </div>
                </template>
            </div>

            <!-- Work unit progress -->
            <div class="section">
                <h3>Work Unit Progress</h3>
                <div>
                    <span x-text="wuCompleted"></span>
                    / <span x-text="dag.total_work_units || 0"></span> completed
                    (<span x-text="fmtPct(wuPct)"></span>)
                </div>
                <div class="progress-bar" style="max-width:500px;">
                    <div class="fill" :style="'width:' + wuPct + '%'"></div>
                </div>
            </div>

            <!-- Work Unit Detail -->
            <template x-if="_wuSummaryRaw.length > 0">
                <div class="section">
                    <h3 style="display:flex; align-items:center; gap:0.5rem;">
                        Work Unit Detail
                        <span style="font-size:0.85rem; opacity:0.6;" x-text="'(' + wuSummary.length + ')'"></span>
                        <input type="text" class="table-filter" placeholder="Filter..."
                               x-model.debounce.200ms="wuFilter">
                    </h3>
                    <table class="timeline-table">
                        <thead>
                            <tr>
                                <th data-sort @click="toggleSort(wuSort, 'name')"
                                    x-text="'WU' + sortIcon(wuSort, 'name')"></th>
                                <th data-sort @click="toggleSort(wuSort, 'site')"
                                    x-text="'Site' + sortIcon(wuSort, 'site')"></th>
                                <th data-sort @click="toggleSort(wuSort, 'running')"
                                    x-text="'Running' + sortIcon(wuSort, 'running')"></th>
                                <th data-sort @click="toggleSort(wuSort, 'idle')"
                                    x-text="'Idle' + sortIcon(wuSort, 'idle')"></th>
                                <th data-sort @click="toggleSort(wuSort, 'held')"
                                    x-text="'Held' + sortIcon(wuSort, 'held')"></th>
                                <th data-sort @click="toggleSort(wuSort, 'avg_wall')"
                                    x-text="'Avg Wall' + sortIcon(wuSort, 'avg_wall')"></th>
                                <th data-sort @click="toggleSort(wuSort, 'avg_cpu_eff')"
                                    x-text="'Avg CPU Eff' + sortIcon(wuSort, 'avg_cpu_eff')"></th>
                                <th data-sort @click="toggleSort(wuSort, 'avg_mem')"
                                    x-text="'Avg Mem (MB)' + sortIcon(wuSort, 'avg_mem')"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="wu in wuSummary" :key="wu.name">
                                <tr>
                                    <td style="font-family:monospace; font-size:0.8rem;" x-text="wu.name"></td>
                                    <td x-text="wu.site || '—'"></td>
                                    <td x-text="wu.running"></td>
                                    <td x-text="wu.idle"></td>
                                    <td>
                                        <span :style="wu.held > 0 ? 'color:#ef4444; font-weight:600;' : ''"
                                              x-text="wu.held"></span>
                                    </td>
                                    <td x-text="fmtWallTime(wu.avg_wall)"></td>
                                    <td x-text="wu.avg_cpu_eff != null ? wu.avg_cpu_eff + '%' : '—'"></td>
                                    <td x-text="wu.avg_mem != null ? wu.avg_mem : '—'"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- HTCondor Jobs -->
            <template x-if="jobs.length > 0">
                <div class="section">
                    <h3 style="display:flex; align-items:center; gap:0.5rem;">
                        HTCondor Jobs
                        <span style="font-size:0.85rem; opacity:0.6;" x-text="'(' + filteredJobs.length + (filteredJobs.length !== jobs.length ? '/' + jobs.length : '') + ')'"></span>
                        <input type="text" class="table-filter" placeholder="Filter (e.g. merge, held, KIT)..."
                               x-model.debounce.200ms="jobFilter">
                    </h3>
                    <table class="timeline-table">
                        <thead>
                            <tr>
                                <th data-sort @click="toggleSort(jobSort, 'work_unit')"
                                    x-text="'WU' + sortIcon(jobSort, 'work_unit')"></th>
                                <th data-sort @click="toggleSort(jobSort, 'name')"
                                    x-text="'Node' + sortIcon(jobSort, 'name')"></th>
                                <th data-sort @click="toggleSort(jobSort, 'status')"
                                    x-text="'Status' + sortIcon(jobSort, 'status')"></th>
                                <th data-sort @click="toggleSort(jobSort, 'wall_time')"
                                    x-text="'Wall Time' + sortIcon(jobSort, 'wall_time')"></th>
                                <th data-sort @click="toggleSort(jobSort, 'memory_mb')"
                                    x-text="'Mem (MB)' + sortIcon(jobSort, 'memory_mb')"></th>
                                <th data-sort @click="toggleSort(jobSort, 'request_memory')"
                                    x-text="'ReqMem' + sortIcon(jobSort, 'request_memory')"></th>
                                <th data-sort @click="toggleSort(jobSort, 'cpu_efficiency')"
                                    x-text="'CPU Eff' + sortIcon(jobSort, 'cpu_efficiency')"></th>
                                <th data-sort @click="toggleSort(jobSort, 'cpus')"
                                    x-text="'CPUs' + sortIcon(jobSort, 'cpus')"></th>
                                <th data-sort @click="toggleSort(jobSort, 'site')"
                                    x-text="'Site' + sortIcon(jobSort, 'site')"></th>
                                <th data-sort @click="toggleSort(jobSort, 'current_step')"
                                    x-text="'Progress' + sortIcon(jobSort, 'current_step')"></th>
                                <th>Details</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="j in filteredJobs" :key="(j.work_unit||'') + j.name">
                                <tr>
                                    <td style="font-family:monospace; font-size:0.8rem; opacity:0.6;" x-text="j.work_unit || '—'"></td>
                                    <td style="font-family:monospace; font-size:0.8rem;">
                                        <a href="#" @click.prevent="jumpToNodeLog(j.name)"
                                           x-text="j.name" style="text-decoration:underline; cursor:pointer;"></a>
                                    </td>
                                    <td x-html="statusBadge(j.status)"></td>
                                    <td x-text="fmtWallTime(j.wall_time)"></td>
                                    <td x-text="j.memory_mb != null ? j.memory_mb : '—'"></td>
                                    <td x-text="j.request_memory || '—'"></td>
                                    <td x-text="j.cpu_efficiency != null ? j.cpu_efficiency + '%' : '—'"></td>
                                    <td x-text="j.cpus"></td>
                                    <td x-text="j.site || '—'"></td>
                                    <td style="font-size:0.8rem; white-space:nowrap;"
                                        :style="j.phase === 'stageout' ? 'color:#f59e0b; font-weight:600;' : ''"
                                        x-text="fmtStepProgress(j) || '—'"></td>
                                    <td style="font-size:0.8rem; max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
                                        :title="j.hold_reason || ''"
                                        x-text="j.hold_reason || '—'"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- No jobs message for completed DAGs -->
            <template x-if="jobs.length === 0 && dag.status === 'completed'">
                <div class="section">
                    <h3>HTCondor Jobs</h3>
                    <p style="opacity:0.6;">DAG completed — no active HTCondor jobs in queue.</p>
                </div>
            </template>

            <!-- Performance Summary -->
            <template x-if="hasPerformance">
                <div class="section">
                    <h3>Performance Summary
                        <template x-if="performance.round_number != null">
                            <span style="font-size:0.85rem; opacity:0.6;">(Round <span x-text="performance.round_number"></span>)</span>
                        </template>
                    </h3>

                    <!-- Per-step CMSSW metrics -->
                    <template x-if="roundStepMetrics.length > 0">
                        <div style="margin-bottom:1rem;">
                            <h4 style="font-size:0.9rem; margin-bottom:0.25rem;">Step Metrics (averages across jobs)</h4>
                            <div style="overflow-x:auto;">
                                <table class="timeline-table">
                                    <thead>
                                        <tr>
                                            <th>Step</th>
                                            <th>Jobs</th>
                                            <th>CPU Eff %</th>
                                            <th>Peak RSS (MB)</th>
                                            <th>Peak VSize (MB)</th>
                                            <th>Wall Time (s)</th>
                                            <th>Time/Event (s)</th>
                                            <th>Throughput (ev/s)</th>
                                            <th>Read (MB)</th>
                                            <th>Write (MB)</th>
                                            <th>Events In</th>
                                            <th>Events Out</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="s in roundStepMetrics" :key="s.step">
                                            <tr>
                                                <td style="font-weight:600;" x-text="'Step ' + s.step"></td>
                                                <td x-text="s.num_jobs"></td>
                                                <td x-text="s.cpu_efficiency"></td>
                                                <td x-text="s.peak_rss_mb"></td>
                                                <td x-text="s.peak_vsize_mb"></td>
                                                <td x-text="s.wall_time"></td>
                                                <td x-text="s.time_per_event"></td>
                                                <td x-text="s.throughput"></td>
                                                <td x-text="s.read_mb"></td>
                                                <td x-text="s.write_mb"></td>
                                                <td x-text="s.events_processed"></td>
                                                <td x-text="s.events_written"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </template>

                    <!-- DAGMan metrics per merge group -->
                    <template x-if="performance.dag_metrics.length > 0">
                        <div>
                            <h4 style="font-size:0.9rem; margin-bottom:0.25rem;">DAGMan Metrics</h4>
                            <table class="timeline-table">
                                <thead>
                                    <tr>
                                        <th>Merge Group</th>
                                        <th>Duration</th>
                                        <th>Nodes</th>
                                        <th>Succeeded</th>
                                        <th>Failed</th>
                                        <th>Exit</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="m in performance.dag_metrics" :key="m.merge_group">
                                        <tr>
                                            <td style="font-family:monospace; font-size:0.8rem;" x-text="m.merge_group"></td>
                                            <td x-text="fmtWallTime(m.duration_sec)"></td>
                                            <td x-text="m.nodes"></td>
                                            <td x-text="m.nodes_succeeded"></td>
                                            <td>
                                                <span :style="m.nodes_failed > 0 ? 'color:#ef4444; font-weight:600;' : ''"
                                                      x-text="m.nodes_failed"></span>
                                            </td>
                                            <td>
                                                <span :style="m.exitcode !== 0 ? 'color:#ef4444; font-weight:600;' : ''"
                                                      x-text="m.exitcode"></span>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Node Event Log (from DAGMan node log files) -->
            <div class="section" data-section="node-event-log">
                <h3 style="display:flex; align-items:center; gap:0.5rem;">
                    Node Event Log
                    <span style="font-size:0.85rem; opacity:0.6;" x-text="'(' + nodeLog.length + ' events)'"></span>
                    <button class="btn btn-sm"
                            @click="showNodeLog = !showNodeLog"
                            x-text="showNodeLog ? 'Hide' : 'Show'"
                            style="margin-left:auto; font-size:0.75rem; padding:0.15rem 0.5rem;"></button>
                </h3>
                <template x-if="showNodeLog">
                    <div>
                        <template x-if="nodeLog.length === 0">
                            <p style="opacity:0.6;">No node log files found (log appears after DAG submission).</p>
                        </template>
                        <template x-if="nodeLog.length > 0">
                            <div>
                                <div style="margin-bottom:0.5rem;">
                                    <label style="font-size:0.85rem;">Filter by node:
                                        <select x-model="nodeFilter" style="font-size:0.85rem; padding:0.15rem 0.3rem;">
                                            <option value="">All nodes</option>
                                            <template x-for="n in nodeLogNodes" :key="n">
                                                <option :value="n" x-text="n"></option>
                                            </template>
                                        </select>
                                    </label>
                                    <span style="font-size:0.8rem; opacity:0.6; margin-left:0.5rem;"
                                          x-text="filteredNodeLog.length + ' events'"></span>
                                </div>
                                <table class="timeline-table">
                                    <thead>
                                        <tr>
                                            <th>Time</th>
                                            <th>Node</th>
                                            <th>Event</th>
                                            <th>Detail</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="(ev, idx) in filteredNodeLog" :key="idx">
                                            <tr>
                                                <td style="white-space:nowrap; font-size:0.8rem;" x-text="fmtDateTime(ev.timestamp)"></td>
                                                <td style="font-family:monospace; font-size:0.8rem;" x-text="ev.node"></td>
                                                <td>
                                                    <span class="badge" :class="eventClass(ev)" x-text="ev.event"></span>
                                                </td>
                                                <td style="font-size:0.8rem; max-width:400px; overflow:hidden; text-overflow:ellipsis;"
                                                    x-text="ev.detail"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <!-- History timeline -->
            <template x-if="history.length > 0">
                <div class="section">
                    <h3 style="display:flex; align-items:center; gap:0.5rem;">
                        History
                        <span style="font-size:0.85rem; opacity:0.6;" x-text="'(' + filteredHistory.length + ')'"></span>
                        <input type="text" class="table-filter" placeholder="Filter..."
                               x-model.debounce.200ms="histFilter">
                    </h3>
                    <table class="timeline-table">
                        <thead>
                            <tr>
                                <th data-sort @click="toggleSort(histSort, 'event_type')"
                                    x-text="'Event' + sortIcon(histSort, 'event_type')"></th>
                                <th data-sort @click="toggleSort(histSort, 'from_status')"
                                    x-text="'From' + sortIcon(histSort, 'from_status')"></th>
                                <th data-sort @click="toggleSort(histSort, 'to_status')"
                                    x-text="'To' + sortIcon(histSort, 'to_status')"></th>
                                <th data-sort @click="toggleSort(histSort, 'nodes_done')"
                                    x-text="'Done' + sortIcon(histSort, 'nodes_done')"></th>
                                <th data-sort @click="toggleSort(histSort, 'nodes_running')"
                                    x-text="'Running' + sortIcon(histSort, 'nodes_running')"></th>
                                <th data-sort @click="toggleSort(histSort, 'nodes_failed')"
                                    x-text="'Failed' + sortIcon(histSort, 'nodes_failed')"></th>
                                <th data-sort @click="toggleSort(histSort, 'created_at')"
                                    x-text="'Time' + sortIcon(histSort, 'created_at')"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="h in filteredHistory" :key="h.id">
                                <tr>
                                    <td x-text="h.event_type"></td>
                                    <td x-html="h.from_status ? statusBadge(h.from_status) : '—'"></td>
                                    <td x-html="h.to_status ? statusBadge(h.to_status) : '—'"></td>
                                    <td x-text="h.nodes_done != null ? h.nodes_done : '—'"></td>
                                    <td x-text="h.nodes_running != null ? h.nodes_running : '—'"></td>
                                    <td x-text="h.nodes_failed != null ? h.nodes_failed : '—'"></td>
                                    <td x-text="fmtDateTime(h.created_at)"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- Back links -->
            <p>
                <a :href="'/ui/workflows/' + encodeURIComponent(dag.workflow_id)">&larr; Back to processing details</a>
            </p>
        </div>
    </template>
</div>
{% endblock %}
