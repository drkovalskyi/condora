services:
  test-db:
    image: postgres:15
    environment:
      POSTGRES_USER: condoratest
      POSTGRES_PASSWORD: condoratest
      POSTGRES_DB: condoratest
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U condoratest"]
      interval: 5s
      timeout: 5s
      retries: 5
